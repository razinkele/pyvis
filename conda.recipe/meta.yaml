{% set name = "pyvis" %}
{% set version = "4.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  noarch: python

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools >=45
    - wheel
  run:
    - python >=3.8
    - jinja2 >=2.9.6
    - networkx >=1.11
    - ipython >=5.3.0
    - jsonpickle >=1.4.1

test:
  imports:
    - pyvis
    - pyvis.network
    - pyvis.types
  commands:
    - python -c "import pathlib, pyvis; p = pathlib.Path(pyvis.__file__).parent; assert (p / 'templates' / 'template.html').exists(), 'template.html missing'; assert (p / 'templates' / 'lib' / 'bindings' / 'utils.js').exists(), 'utils.js missing'; assert (p / 'templates' / 'lib' / 'tom-select' / 'tom-select.css').exists(), 'tom-select.css missing'; print('All runtime resources verified')"

about:
  home: https://github.com/razinkele/pyvis
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE_BSD.txt
  summary: A Python network graph visualization library - Optimized Edition
  dev_url: https://github.com/razinkele/pyvis

extra:
  recipe-maintainers:
    - razinkele
