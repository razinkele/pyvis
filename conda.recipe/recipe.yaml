context:
  name: pyvis
  version: "4.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  path: ..

build:
  number: 0
  noarch: python
  script:
    - python -m pip install . -vv --no-deps --no-build-isolation
    - python -c "import shutil, os, glob; share=os.path.join(os.environ['PREFIX'],'share','pyvis'); [os.makedirs(os.path.join(share,d),exist_ok=True) for d in ('examples','notebooks')]; [shutil.copy2(f,os.path.join(share,'examples')) for f in glob.glob('examples/*.py')]; [shutil.copy2(f,os.path.join(share,'notebooks')) for f in glob.glob('notebooks/*.ipynb')+glob.glob('notebooks/*.csv')+glob.glob('notebooks/*.dot')]"

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools >=45
    - wheel
  run:
    - python >=3.8
    - jinja2 >=2.9.6
    - networkx >=1.11
    - ipython >=5.3.0
    - jsonpickle >=1.4.1

tests:
  - python:
      imports:
        - pyvis
        - pyvis.network
        - pyvis.types
  - script:
      - python -c "import pathlib, sys; s = pathlib.Path(sys.prefix) / 'share' / 'pyvis'; assert any(s.glob('examples/*.py')), 'no example files'; assert any(s.glob('notebooks/*.ipynb')), 'no notebook files'; print('Examples and notebooks verified')"

about:
  homepage: https://github.com/razinkele/pyvis
  license: BSD-3-Clause
  license_file: LICENSE_BSD.txt
  summary: A Python network graph visualization library - Optimized Edition
  repository: https://github.com/razinkele/pyvis

extra:
  recipe-maintainers:
    - razinkele
