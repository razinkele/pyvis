# Conda environment for PyVis Optimized
# Create with: conda env create -f environment.yml
# Activate with: conda activate pyvis-optimized

name: pyvis-optimized
channels:
  - conda-forge
  - defaults

dependencies:
  # Python version
  - python>=3.6

  # Core dependencies
  - jinja2>=2.9.6
  - networkx>=1.11
  - ipython>=5.3.0
  - jsonpickle>=1.4.1

  # Optional: Shiny support
  # Uncomment if you want Shiny integration
  # - pip
  # - pip:
  #   - shiny>=0.6.0
  #   - htmltools

  # Development tools (optional)
  - pytest>=6.0
  - pytest-cov
  - black
  - flake8
  - mypy

  # Useful extras
  - jupyter
  - matplotlib
  - pandas

  # For building the package
  - setuptools>=45
  - wheel
  - build
